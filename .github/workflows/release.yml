name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      skip_testflight:
        description: 'Skip TestFlight upload (just build IPA)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  build-daemon:
    name: Build Daemon (npm package)
    needs: [build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: daemon/package-lock.json
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - name: Build and test daemon
        run: |
          cd daemon && npm ci && npm run build
          npm test 2>&1 | tee test-output.txt; RC=${PIPESTATUS[0]}
          # Jest with forceExit exits non-zero on open handles even when all tests pass.
          if grep -q "Tests:.*failed" test-output.txt; then
            echo "::error::Tests failed"
            exit 1
          fi
          if ! grep -q "Tests:.*passed" test-output.txt; then
            echo "::error::No test results found — Jest may have crashed"
            exit $RC
          fi
      - name: Package daemon
        run: cd daemon && npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: daemon-package
          path: daemon/*.tgz

  build-web:
    name: Build Web Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/

  build-android:
    name: Build Android APK (Tauri)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"
      - run: cd web && npm ci
      - run: cd desktop && npm ci
      - name: Initialize Android project
        run: cd desktop && npx tauri android init
      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 --decode > desktop/src-tauri/gen/android/app/google-services.json
      - name: Patch Android project (FCM, cleartext, back nav)
        run: cd desktop && bash scripts/setup-android.sh
      - name: Build APK
        run: cd desktop && npx tauri android build --target aarch64
      - name: Decode signing keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 --decode > /tmp/companion.keystore
      - name: Sign and rename APK
        run: |
          APK=$(find desktop/src-tauri/gen/android/app/build/outputs/apk -name '*.apk' | head -1)
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner sign \
            --ks /tmp/companion.keystore \
            --ks-pass pass:android --key-pass pass:android \
            --out companion-${{ github.ref_name }}-android.apk "$APK"
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: companion-*-android.apk

  build-ios:
    name: Build iOS (Tauri)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select latest Xcode (iOS 26 SDK required by App Store Connect)
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "::error::No Xcode_*.app found under /Applications"
            ls /Applications | grep -i xcode || true
            exit 1
          fi
          echo "Selecting $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios
      - run: cd web && npm ci
      - run: cd desktop && npm ci
      - name: Initialize iOS project
        run: cd desktop && npx tauri ios init
      - name: Patch iOS project (icons)
        run: cd desktop && bash scripts/setup-ios.sh
      - name: Set iOS display name
        run: |
          INFO_PLIST=$(find desktop/src-tauri/gen/apple -name 'Info.plist' -path '*_iOS*' | head -1)
          if [ -n "$INFO_PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Hexi\'s Companion" "$INFO_PLIST" 2>/dev/null || \
              /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Hexi\'s Companion" "$INFO_PLIST"
            /usr/libexec/PlistBuddy -c "Set :CFBundleName Hexi\'s Companion" "$INFO_PLIST"
            /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$INFO_PLIST" 2>/dev/null || \
              /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$INFO_PLIST"
          fi
      - name: Import Apple Distribution certificate
        env:
          APPLE_CERTIFICATE_P12_B64: ${{ secrets.APPLE_CERTIFICATE_P12_B64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "$APPLE_CERTIFICATE_P12_B64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
      - name: Install provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE_B64: ${{ secrets.APPLE_PROVISIONING_PROFILE_B64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APPLE_PROVISIONING_PROFILE_B64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/companion.mobileprovision
      - name: Configure manual code signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          PBXPROJ="desktop/src-tauri/gen/apple/companion-desktop.xcodeproj/project.pbxproj"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/companion.mobileprovision))
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< $(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/companion.mobileprovision))
          # Disable automatic signing and set manual provisioning
          sed -i '' "s/CODE_SIGN_IDENTITY = .*/CODE_SIGN_IDENTITY = \"Apple Distribution\";/" "$PBXPROJ"
          sed -i '' "s/DEVELOPMENT_TEAM = .*/DEVELOPMENT_TEAM = \"$APPLE_TEAM_ID\";/" "$PBXPROJ"
          sed -i '' '/CODE_SIGN_IDENTITY/a\'$'\n\t\t\t\t'"PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_NAME\";" "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/' "$PBXPROJ"
          # Raise iOS deployment target so Xcode 26 doesn't try to link the
          # missing Swift 5.6 backwards-compatibility shims (swiftCompatibility56,
          # swiftCompatibilityConcurrency, swiftCompatibilityPacks) that aren't
          # shipped in the iOS 26 SDK. 17.0 is enough to drop them and covers
          # most actively-used iPhones/iPads.
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 17.0/g' "$PBXPROJ"
      - name: Decode GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_B64 }}
        run: |
          IOS_DIR=$(find desktop/src-tauri/gen/apple -maxdepth 1 -name '*_iOS' -type d | head -1)
          if [ -z "$IOS_DIR" ]; then
            IOS_DIR="desktop/src-tauri/gen/apple/Companion_iOS"
            mkdir -p "$IOS_DIR"
          fi
          echo "$GOOGLE_SERVICE_INFO_PLIST_B64" | base64 --decode > "$IOS_DIR/GoogleService-Info.plist"
      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_B64" | base64 --decode > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
      - name: Write ExportOptions.plist for signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Tauri's `tauri ios build --export-method app-store-connect` does
          # the full build -> archive -> export pipeline itself. It only sets
          # the `method` field in ExportOptions.plist; we must pre-write the
          # rest (teamID, manual signingStyle, provisioning profile mapping)
          # at gen/apple/ExportOptions.plist where Tauri reads it.
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /dev/stdin <<< $(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/companion.mobileprovision))
          EXPORT_PLIST="desktop/src-tauri/gen/apple/ExportOptions.plist"
          cat > "$EXPORT_PLIST" << EOPLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.hexidecibel.companion</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOPLIST
          echo "Wrote $EXPORT_PLIST:"
          cat "$EXPORT_PLIST"
      - name: Build + archive iOS via Tauri (export step expected to fail)
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Tauri 2.10 runs xcodebuild build -> archive -> exportArchive in one
          # orchestrator process. The build+archive phases work (the "Build
          # Rust Code" PhaseScript IPC stays in-process), but Tauri ALWAYS
          # passes `-allowProvisioningUpdates` to `xcodebuild -exportArchive`
          # (cargo-mobile2 src/apple/target.rs ExportConfig). On a CI runner
          # with no signed-in Apple ID this triggers `exportArchive No
          # Accounts` / `No profiles for 'com.hexidecibel.companion'` even
          # when ExportOptions.plist has signingStyle=manual + the profile is
          # locally installed. Tauri exposes no flag to disable that.
          #
          # Strategy: let Tauri build + archive (the .xcarchive is written to
          # gen/apple/build/ before the broken export step runs), capture
          # whether the archive succeeded, then manually run our own
          # `xcodebuild -exportArchive` *without* -allowProvisioningUpdates
          # so Xcode uses the local manual provisioning profile.
          cd desktop
          set +e
          npx tauri ios build --export-method app-store-connect 2>&1 | tee /tmp/tauri-ios.log
          TAURI_RC=${PIPESTATUS[0]}
          set -e
          echo "tauri ios build exit code: $TAURI_RC"
          ARCHIVE=$(find src-tauri/gen/apple/build -maxdepth 3 -name '*.xcarchive' -type d | head -1)
          if [ -z "$ARCHIVE" ]; then
            echo "::error::No .xcarchive produced — build/archive failed before export"
            exit 1
          fi
          echo "Archive present at: $ARCHIVE"
          # If Tauri only failed at the export step (which we expect), the
          # archive is good. We continue.
          if [ $TAURI_RC -ne 0 ] && ! grep -q 'failed to export iOS app' /tmp/tauri-ios.log; then
            echo "::error::Tauri failed for a reason other than export"
            exit $TAURI_RC
          fi
      - name: Set CFBundleVersion in archive
        run: |
          set -e
          ARCHIVE=$(find desktop/src-tauri/gen/apple/build -name '*.xcarchive' -type d | head -1)
          if [ -z "$ARCHIVE" ]; then
            echo "::error::No .xcarchive found under desktop/src-tauri/gen/apple/build"
            find desktop/src-tauri/gen/apple/build -maxdepth 4 -type d | head -20
            exit 1
          fi
          APP_PLIST=$(find "$ARCHIVE/Products/Applications" -maxdepth 2 -name 'Info.plist' | head -1)
          if [ -z "$APP_PLIST" ]; then
            echo "::error::No Info.plist found inside archive Applications dir"
            ls -la "$ARCHIVE/Products/Applications/" || true
            exit 1
          fi
          case "$APP_PLIST" in
            *.app/Info.plist) ;;
            *)
              echo "::error::Resolved plist is not <app>.app/Info.plist: $APP_PLIST"
              find "$ARCHIVE/Products/Applications" -name 'Info.plist' | head -10
              exit 1
              ;;
          esac
          ARCHIVE_PLIST="$ARCHIVE/Info.plist"
          if [ -f "$ARCHIVE_PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :ApplicationProperties:CFBundleVersion ${{ github.run_number }}" "$ARCHIVE_PLIST" 2>/dev/null || \
              /usr/libexec/PlistBuddy -c "Add :ApplicationProperties:CFBundleVersion string ${{ github.run_number }}" "$ARCHIVE_PLIST"
            echo "Set archive ApplicationProperties.CFBundleVersion to ${{ github.run_number }}"
          fi
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string ${{ github.run_number }}" "$APP_PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" "$APP_PLIST"
          echo "Set CFBundleVersion to ${{ github.run_number }} in $APP_PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_PLIST"
      - name: Manually export IPA (xcodebuild -exportArchive without -allowProvisioningUpdates)
        id: locate_ipa
        run: |
          ARCHIVE=$(find desktop/src-tauri/gen/apple/build -maxdepth 3 -name '*.xcarchive' -type d | head -1)
          if [ -z "$ARCHIVE" ]; then
            echo "::error::No .xcarchive found"
            exit 1
          fi
          # Use the same ExportOptions.plist we already wrote (manual signing
          # + provisioning profile mapping). xcodebuild will resolve the named
          # profile from ~/Library/MobileDevice/Provisioning Profiles/ where
          # we installed it earlier.
          EXPORT_PLIST="desktop/src-tauri/gen/apple/ExportOptions.plist"
          EXPORT_DIR="desktop/src-tauri/gen/apple/build/manual-export"
          mkdir -p "$EXPORT_DIR"
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE" \
            -exportOptionsPlist "$EXPORT_PLIST" \
            -exportPath "$EXPORT_DIR"
          IPA=$(find "$EXPORT_DIR" -name '*.ipa' | head -1)
          if [ -z "$IPA" ]; then
            echo "::error::Manual export produced no .ipa"
            ls -la "$EXPORT_DIR"
            exit 1
          fi
          echo "Exported IPA: $IPA"
          echo "ipa_path=$IPA" >> "$GITHUB_OUTPUT"
      - name: Verify CFBundleVersion in produced IPA
        run: |
          set -e
          IPA=$(find desktop/src-tauri/gen/apple/build -name '*.ipa' | head -1)
          if [ -z "$IPA" ]; then
            echo "::error::No IPA found"
            find desktop/src-tauri/gen/apple/build -maxdepth 6 -type f -name '*.ipa' || true
            exit 1
          fi
          echo "Inspecting $IPA"
          TMPDIR=$(mktemp -d)
          unzip -q "$IPA" -d "$TMPDIR"
          APP_DIR=$(find "$TMPDIR/Payload" -maxdepth 1 -name '*.app' -type d | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "::error::No .app inside Payload/"
            ls -la "$TMPDIR/Payload" || true
            exit 1
          fi
          echo "App bundle: $APP_DIR"
          echo "--- Info.plist (CFBundleVersion + CFBundleShortVersionString) ---"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_DIR/Info.plist"
          echo "--- All top-level keys ---"
          /usr/libexec/PlistBuddy -c "Print" "$APP_DIR/Info.plist" | head -40
          # Also check the archive's Info.plist for sanity
          ARCHIVE_PLIST=$(find desktop/src-tauri/gen/apple/build -name '*.xcarchive' -type d | head -1)/Info.plist
          if [ -f "$ARCHIVE_PLIST" ]; then
            echo "--- Archive's top-level Info.plist (xcarchive metadata) ---"
            /usr/libexec/PlistBuddy -c "Print :ApplicationProperties:CFBundleVersion" "$ARCHIVE_PLIST" 2>/dev/null || echo "no ApplicationProperties.CFBundleVersion"
            /usr/libexec/PlistBuddy -c "Print :ApplicationProperties:CFBundleShortVersionString" "$ARCHIVE_PLIST" 2>/dev/null || echo "no ApplicationProperties.CFBundleShortVersionString"
          fi
          rm -rf "$TMPDIR"
      - name: Upload IPA to TestFlight
        if: ${{ github.event_name == 'push' || inputs.skip_testflight != true }}
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -o pipefail
          xcrun altool --upload-app --type ios \
            --file "${{ steps.locate_ipa.outputs.ipa_path }}" \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER" 2>&1 | tee /tmp/altool-upload.log
          ALTOOL_RC=${PIPESTATUS[0]}
          echo "altool exit code: $ALTOOL_RC"
          if [ $ALTOOL_RC -ne 0 ]; then
            echo "::error::altool exited with code $ALTOOL_RC — TestFlight upload failed"
            exit $ALTOOL_RC
          fi
          # altool occasionally exits 0 even when the upload failed (it logs the
          # error to stdout but doesn't propagate it). Detect known error markers.
          if grep -Eq 'ERROR ITMS|UNEXPECTED_ERROR|ENTITY_ERROR|Error Domain' /tmp/altool-upload.log; then
            echo "::error::altool reported an upload error (see log above)"
            exit 1
          fi
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: desktop/src-tauri/gen/apple/build/**/*.ipa

  build-desktop:
    name: Build Desktop (${{ matrix.os_name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            os_name: macOS
            artifact_glob: 'desktop/src-tauri/target/release/bundle/dmg/*.dmg'
            artifact_name: desktop-macos
          - os: windows-latest
            os_name: Windows
            artifact_glob: 'desktop/src-tauri/target/release/bundle/nsis/*.exe'
            artifact_name: desktop-windows
          - os: ubuntu-latest
            os_name: Linux
            artifact_glob: 'desktop/src-tauri/target/release/bundle/deb/*.deb'
            artifact_name: desktop-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: cd web && npm ci
      - run: cd desktop && npm ci
      - run: cd desktop && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}

  create-release:
    name: Create GitHub Release
    needs: [build-daemon, build-web, build-android, build-ios, build-desktop]
    if: always() && needs.build-daemon.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Display artifacts
        run: find artifacts -type f | head -20
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: true
          files: |
            artifacts/android-apk/*
            artifacts/ios-ipa/*
            artifacts/desktop-macos/*
            artifacts/desktop-windows/*
            artifacts/desktop-linux/*
            artifacts/daemon-package/*
